<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="container-fluid">
    <ul><li><strong>Contract Register</strong></li></ul>
    <ul><li><a href="/contracts">Contracten</a></li></ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <div id="toast-container"></div>
  <div x-data="{ open: false }" @open-modal.window="open = true; $nextTick(() => document.getElementById('modal').showModal())" @close-modal.window="open = false; document.getElementById('modal').close()">
    <dialog id="modal">
      <article>
        <header>
          <button class="close" aria-label="Sluiten" @click="$dispatch('close-modal')" style="float:right; background:none; border:none; font-size:1.5rem; cursor:pointer; line-height:1;">×</button>
        </header>
        <div id="modal-body"></div>
      </article>
    </dialog>
  </div>
  <script>
    document.body.addEventListener('closeModal', function () {
      window.dispatchEvent(new CustomEvent('close-modal'));
    });
  </script>
</body>
</html>
